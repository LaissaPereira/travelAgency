<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travelgram</title>
    <link rel="stylesheet" href="src/styles/index.css" > 
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alice&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-surface-color">
    <nav class="container">
        <a href="#" id="logo">
            <img src="src/assets/Logo.svg" alt="Log image">
        </a>
        <ul id="primary-menu">
            <li>
                <a href="#">
                    <img src="src/assets/MagnifyingGlass.svg" alt="Search image">
                </a>
            </li>
            <li><a href="#">Explore</a></li>
            <li><a href="#">My destinations</a></li>
            <li><a href="#"></a><img src="src/assets/Profile pic.png" alt="Profile image"></li>
            
        </ul>
    </nav>
   
    <header>
        <div class="container">
            <div id="profile">
                <img src="src/assets/Profile pic.png" alt="Profile image">
                <div>
                    <h1>Julia Sun</h1>
                    <p> A lover of travel, culture, and gastronomy. 🌍✈️ <br>
                        Here, I share stories captured in every snapshot, 
                        exploring fascinating corners of 
                        our planet from the bustling city of São Paulo. 🏙️📸
                    </p>

                </div>
                <ul id="info">
                    <li>
                        <img src="src/assets/MapPin.svg" alt="Map pin image">
                        <span>São Paulo, Brazil</span>
                    </li>
                    <li>
                        <img src="src/assets/AirplaneTilt.svg" alt="Airplane image">
                        <span>37 trips</span>
                    </li>
                    <li>
                        <img src="src/assets/Image.svg" alt="Image icon">
                        <span>240 photos</span>
                    </li>

                </ul>
            </div>        
        </div>
    </header>
     </div>
    <main></main>
    <footer><p>2026 Travelgram</p></footer>
   
    
</body>
</html>
